edition: 3.0.0
name: fund-eye-server
access: 'default'

vars:
  region: 'cn-beijing'  # 可改为 cn-shanghai, cn-beijing 等

resources:
  fund-eye-server:
    component: fc3
    props:
      region: ${vars.region}
      functionName: 'fund-eye-server'
      description: '基金数据代理服务'
      runtime: 'nodejs20'
      code: ./dist
      handler: index.handler
      memorySize: 128
      timeout: 30
      internetAccess: true
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            methods:
              - GET
              - POST
              - OPTIONS
            authType: anonymous
